    .sans{font-family:'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',sans-serif;}
    .pill{transition:transform .25s ease;transform-box:fill-box;transform-origin:center;}
    .pill:hover{transform:scale(1.08);}
  </style>

