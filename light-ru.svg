<svg viewBox="0 0 1180 610" width="1180" height="610" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Генрих Багдасарян — Frontend-разработчик">
  <title>Генрих Багдасарян — Frontend-разработчик</title>
  <desc>Анимированный баннер профиля GitHub (светлая тема).</desc>

  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.35 0;0.35 0;-0.35 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2563EB"/>
      <stop offset="55%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#2563EB" stop-opacity="0.20"/><stop offset="100%" stop-color="#2563EB" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#06B6D4" stop-opacity="0.18"/><stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowC" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#10B981" stop-opacity="0.16"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/></radialGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#06B6D4" stop-opacity="0"/><stop offset="50%" stop-color="#06B6D4" stop-opacity="0.10"/><stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="12%" stop-color="#ffffff" stop-opacity="0.35"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#94A3B8" flood-opacity="0.35"/></filter>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer></filter>

    <clipPath id="leftClip"><rect x="24" y="24" width="430" height="562" rx="22"/></clipPath>
    <clipPath id="rootClip"><rect x="0" y="0" width="1180" height="610" rx="28"/></clipPath>

    <clipPath id="tp0"><rect x="558" y="150" width="0" height="36"><animate attributeName="width" dur="12.5s" repeatCount="indefinite" values="0;280;280;0;0" keyTimes="0;0.088;0.184;0.2;1"/></rect></clipPath>
    <clipPath id="tp1"><rect x="558" y="150" width="0" height="36"><animate attributeName="width" dur="12.5s" repeatCount="indefinite" values="0;0;252;252;0;0" keyTimes="0;0.2;0.288;0.384;0.4;1"/></rect></clipPath>
    <clipPath id="tp2"><rect x="558" y="150" width="0" height="36"><animate attributeName="width" dur="12.5s" repeatCount="indefinite" values="0;0;140;140;0;0" keyTimes="0;0.4;0.488;0.584;0.6;1"/></rect></clipPath>
    <clipPath id="tp3"><rect x="558" y="150" width="0" height="36"><animate attributeName="width" dur="12.5s" repeatCount="indefinite" values="0;0;210;210;0;0" keyTimes="0;0.6;0.688;0.784;0.8;1"/></rect></clipPath>
    <clipPath id="tp4"><rect x="558" y="150" width="0" height="36"><animate attributeName="width" dur="12.5s" repeatCount="indefinite" values="0;0;224;224;0" keyTimes="0;0.8;0.888;0.984;1"/></rect></clipPath>
