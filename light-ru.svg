      <circle cx="300" cy="540" r="1.3" opacity="0.4"><animate attributeName="cy" values="540;120" dur="12s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.5;0" dur="12s" repeatCount="indefinite"/></circle>
      <circle cx="760" cy="560" r="1.5" fill="#2563EB"><animate attributeName="cy" values="560;150" dur="10s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.45;0" dur="10s" repeatCount="indefinite"/></circle>
