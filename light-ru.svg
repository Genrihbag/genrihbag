      <circle cx="520" cy="580" r="1.4"><animate attributeName="cy" values="580;160" dur="11s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.45;0" dur="11s" repeatCount="indefinite"/></circle>
